<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case Report</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/vendor/ol.css">
</head>
<body>

  <!-- Loading overlay -->
  <div id="loader">
    <div class="loader-content">
      <div class="spinner"></div>
      <p>Loading report data&hellip;</p>
    </div>
  </div>

  <header>
    <div class="header-inner">
      <div class="branding">
        <img src="img/logo.png" alt="Gladiator Forensics" class="branding-logo">
        <div class="branding-text">
          <span class="branding-company">Gladiator Forensics</span>
          <span class="branding-title">Case Report &mdash; <span id="case-name">Loading&hellip;</span></span>
        </div>
      </div>
      <nav id="main-nav">
        <button data-tab="section-dashboard" class="active">Dashboard</button>
        <button data-tab="section-data">Data</button>
        <button data-tab="section-map">Map</button>

        <div class="theme-toggle">
          <span class="theme-toggle-label" title="Light mode">&#9728;</span>
          <label class="theme-switch">
            <input type="checkbox" id="theme-checkbox">
            <span class="theme-slider"></span>
          </label>
          <span class="theme-toggle-label" title="Dark mode">&#9790;</span>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <!-- DASHBOARD -->
    <section id="section-dashboard" class="tab-content">
      <div class="kpi-row">
        <div class="kpi-card">
          <h3>Total Items</h3>
          <span id="kpi-total" class="kpi-value">&mdash;</span>
        </div>
        <div class="kpi-card">
          <h3>Open</h3>
          <span id="kpi-open" class="kpi-value">&mdash;</span>
        </div>
        <div class="kpi-card">
          <h3>Closed</h3>
          <span id="kpi-closed" class="kpi-value">&mdash;</span>
        </div>
        <div class="kpi-card">
          <h3>Total Amount</h3>
          <span id="kpi-amount" class="kpi-value">&mdash;</span>
        </div>
      </div>
      <div class="chart-row">
        <div class="chart-container">
          <h3>Status Distribution</h3>
          <canvas id="chart-status"></canvas>
        </div>
        <div class="chart-container">
          <h3>Timeline</h3>
          <canvas id="chart-timeline"></canvas>
        </div>
      </div>
    </section>

    <!-- DATA GRIDS -->
    <section id="section-data" class="tab-content" hidden>
      <h2>Case Items</h2>
      <div id="grid-cases" class="ag-theme-alpine" style="width:100%; height:600px;"></div>
    </section>

    <!-- MAP -->
    <section id="section-map" class="tab-content" hidden>
      <h2>Locations</h2>
      <div id="map-container" style="width:100%; height:600px;"></div>
    </section>
  </main>

  <footer>
    <p>Report generated on <span id="report-date"></span></p>
  </footer>

  <!-- Vendor libraries (classic scripts, file:// safe) -->
  <script src="js/vendor/sql-wasm.js"></script>
  <script src="js/vendor/ag-grid-community.min.js"></script>
  <script src="js/vendor/chart.umd.min.js"></script>
  <script src="js/vendor/ol.js"></script>

  <!-- App modules (order matters) -->
  <script src="js/db.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/grids.js"></script>
  <script src="js/map.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
